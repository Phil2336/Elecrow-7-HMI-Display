display:
  - platform: rpi_dpi_rgb
    id: my_display
    data_pins:
      red: [14, 21, 47, 48, 45]
      green: [9, 46, 3, 8, 16, 1]
      blue: [15, 7, 6, 5, 4]
    de_pin: 41
    hsync_pin: 39
    vsync_pin: 40
    pclk_pin: 0

    hsync_front_porch: 40
    hsync_pulse_width: 48
    hsync_back_porch: 13 # 40 in Specs Original is 13

    vsync_front_porch: 1
    vsync_pulse_width: 31
    vsync_back_porch: 13

    pclk_inverted: true
    color_order: RGB
    auto_clear_enabled: false
    update_interval: 30s
    dimensions:
      width: 800
      height: 480

