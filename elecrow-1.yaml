## Uptime, Wifi Info etc
##
text_sensor:

  - platform: wifi_info
    ip_address:
      name: "Elecrow-1 Address"
      id: elecrow1_address
    bssid:
      name: Elecrow-1 AP Mac Address
      id: elecrow1_ap
      filters:
        substitute:
          - "84:D8:1B:DD:4E:F4 -> Front_Office"
          - "00:5F:67:A0:71:F0 -> Centre_Office"
          - "C0:06:C3:35:A7:FE -> Lounge_Room"
          - "00:31:92:1B:38:22 -> Bbq_Area"
          - "50:C7:BF:D3:38:5A -> Back_Room"
          - "B0:4E:26:E4:41:FE -> Outdoor"
          - "50:C7:BF:D3:3C:61 -> Shed"
    mac_address:
      name: "Elecro-1 Wifi Mac Address"
## End of Standard Text Sensors.      

  

