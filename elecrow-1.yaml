# Example from:- https://www.espboards.dev/blog/esphome-configuring-elecrow-7-inch-display/
packages:
  lvgl: !include "packages/Elecrow/lvgl-test.yaml"
#  lvgl1: !include "packages/elecrow-1/lvgl-test1.yaml"
  fonts: !include "fonts/fonts.yaml"
  colors: !include "packages/colors.yaml"
#  images: !include "img/images.yaml"
  #sensors_wifi_etc: !include "packages/sensors_wifi_etc.yaml"
  sensors_ha: !include "packages/7in_panels/sensors_ha.yaml"

esphome:
  name: "elecrow-1"
  friendly_name: "Elecrow LCD-1"
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio

  on_boot: 
    - priority: 800
      then:
        - script.execute: toggle_leds

