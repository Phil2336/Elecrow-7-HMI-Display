#    id: gt911_int
script:
  - id: toggle_leds
    mode: queued
    then:
      - switch.turn_off: out_pin_43
      - switch.turn_off: out_pin_44
      - delay: 500ms
      - switch.turn_on: out_pin_43
      - delay: 300ms
      - switch.turn_on: out_pin_44
      - delay: 1000ms
      - switch.turn_off: out_pin_44
      - delay: 300ms
      - switch.turn_off: out_pin_43
      - delay: 500ms
      - switch.turn_on: out_pin_43
      - delay: 300ms
      - switch.turn_on: out_pin_44
      - delay: 1000ms
      - switch.turn_off: out_pin_44
      - delay: 300ms
      - switch.turn_off: out_pin_43
      - delay: 500ms
      - switch.turn_on: out_pin_43
      - delay: 300ms
      - switch.turn_on: out_pin_44
      - delay: 1000ms
      - switch.turn_off: out_pin_44
      - delay: 300ms
      - switch.turn_off: out_pin_43
