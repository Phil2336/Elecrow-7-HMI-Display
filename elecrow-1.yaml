# I2C bus configuration
i2c:
  id: i2c_bus
  sda: 19
  scl: 20
#  frequency: 400kHz # Added to try & fix full Crash when Touch is enabled
  scan: True # As Above.


# PCA9554 GPIO extender for display reset

pca9554:
  - id: p_c_a
    address: 0x20 # Originally 0x20 Which applies to PCA9554
    i2c_id: i2c_bus

switch:
#---------- Test Uart Port ------------------------------------------------------
  - platform: gpio
    pin: 43 # TXD0
    inverted: True
    id: out_pin_43
    name: "Pin 43 Output"
  - platform: gpio
    pin: 44 # RXD0
    inverted: True
    id: out_pin_44
    name: "Pin 44 Output"


#  - platform: gpio
