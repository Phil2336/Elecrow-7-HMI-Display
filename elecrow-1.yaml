esp32:
  board: esp32-s3-devkitc1-n4r8
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHFREQ: "80MHz" # this is needed for flashing
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: y
      CONFIG_FLASHMODE_QIO: y
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: y
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ: '240'
      CONFIG_SPIRAM_RODATA: "y"

# Enable PSRAM on ESP32-S3
psram:
  mode: octal
  speed: 80MHz 
# Enable logging
logger:
  level: DEBUG
  logs:
    touch: DEBUG
    display: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "xhKn8BNx3gxWmVr324g+PcFbJqkHmghHG4iW1/nqbLQ="
ota:
  - platform: esphome
    password: "80c51de12799db4826e77439999d3ceb"

# IP Reservation:-192.168.59.199
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Elecrowlcd Fallback Hotspot"
    password: "0xqFEFl8NeOC"

web_server:
  version: 3
  include_internal: True

captive_portal:


output:
  - platform: ledc
    pin: 2
    frequency: 1220
    id: gpio_backlight_pwm

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: ${devicename} Display Backlight
    id: back_light
    restore_mode: ALWAYS_ON

